<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        .carousel-box {
            position: relative;
        }
        .carousel-box img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 10px;
        }
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
        }
        .prev { left: 10px; }
        .next { right: 10px; }

        @media (max-width: 768px) {
            .carousel-box img {
                height: 250px;
            }
        }
    </style>
</head>
<body>
<div class="container-fluid bg-dark text-white text-center p-5">
    <h1>Animal History</h1>
    <p>Explore the world of animals and their history</p>
</div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10 col-sm-12">

            <div class="carousel-box">
                <img id="slider" src="https://picsum.photos/id/237/800/400" class="img-fluid">

                <button class="btn btn-dark prev" onclick="prevSlide()">❮</button>
                <button class="btn btn-dark next" onclick="nextSlide()">❯</button>
            </div>

        </div>
    </div>
</div>

<div class="container mt-5">
    <div class="row">

        <div class="col-lg-4 col-md-6 col-sm-12 mb-3">
            <div class="card">
                <img src="https://picsum.photos/id/1025/300/200" class="card-img-top">
                <div class="card-body">
                    <h5>Lion</h5>
                    <p>The lion is known as the king of the jungle and has a rich history.</p>
                </div>
            </div>
        </div>

        <div class="col-lg-4 col-md-6 col-sm-12 mb-3">
            <div class="card">
                <img src="https://picsum.photos/id/1062/300/200" class="card-img-top">
                <div class="card-body">
                    <h5>Elephant</h5>
                    <p>Elephants are the largest land animals with strong memory and history.</p>
                </div>
            </div>
        </div>

        <div class="col-lg-4 col-md-12 col-sm-12 mb-3">
            <div class="card">
                <img src="https://picsum.photos/id/1074/300/200" class="card-img-top">
                <div class="card-body">
                    <h5>Tiger</h5>
                    <p>Tigers are powerful predators found in forests and jungles.</p>
                </div>
            </div>
        </div>

    </div>
</div>
<script>
    let images = [
        "https://picsum.photos/id/237/800/400",
        "https://picsum.photos/id/1025/800/400",
        "https://picsum.photos/id/1062/800/400",
        "https://picsum.photos/id/1074/800/400"
    ];

    let index = 0;

    function showSlide() {
        document.getElementById("slider").src = images[index];
    }

    function nextSlide() {
        index++;
        if (index >= images.length) index = 0;
        showSlide();
    }

    function prevSlide() {
        index--;
        if (index < 0) index = images.length - 1;
        showSlide();
    }

    setInterval(nextSlide, 3000);
</script>

</body>
</html>
